<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-200">

  <!-- MAIN CONTAINER -->
  <div class="relative w-full h-[100vh] flex flex-col lg:flex-row overflow-hidden shadow-2xl">

    <!-- LEFT 70% -->
    <div class="w-full lg:w-[70%] bg-[#2F4156] flex items-center justify-center">
      <div class="w-[250px] h-[250px] md:w-[400px] md:h-[400px] lg:w-[720px] lg:h-[720px] rounded-full overflow-hidden bg-gradient-to-br from-purple-500 via-blue-500 to-pink-400 flex items-center justify-center">
  <img
    src=""
    alt="Admin Illustration"
    class="w-full h-full object-cover"
    id="img"
  />
</div>

    </div>

    <!-- RIGHT 30% -->
    <div class="hidden lg:block lg:w-[30%] bg-white"></div>

    <!-- LOGIN CARD (CENTERED ON PARTITION) -->
    
<div class="absolute lg:top-1/2 lg:left-[70%] lg:-translate-x-1/2 lg:-translate-y-1/2 w-full flex justify-center top-[20%] left-auto translate-x-0 translate-y-0 mt-10 lg:mt-0">
  <div class="bg-slate-200 w-[90%] max-w-[520px] rounded-2xl p-6 md:p-10 lg:p-12 shadow-2xl">
    <!-- Icon -->
    <div class="flex justify-center mb-8">
      <div class="w-14 h-14 rounded-full bg-[#2F4156] flex items-center justify-center text-white text-2xl">
        →
      </div>
    </div>

    <!-- Heading -->
    <h2 class="text-2xl md:text-3xl font-bold text-center text-slate-800" id="welcomeMsg">
      
    </h2>
    <p class="text-center text-slate-600 mt-2 mb-8 md:mb-10 text-base md:text-lg">
      Sign in to access your dashboard
    </p>

    <!-- Form -->
    <form class="space-y-6 mb-8" id="loginform" onsubmit="handleLogin(event)" autocomplete="off">

      <!-- Email -->
      <div class="relative">
        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-lg">
          👤
        </span>
        <input
          id="loginEmail"
          type="email"
          placeholder="Email"
          class="w-full py-3 md:py-4 pl-12 md:pl-14 pr-4 rounded-full outline-none text-base md:text-lg focus:ring-2 focus:ring-[#2F4156]"
          autocomplete="username"
        />
      </div>

      <!-- Password -->
      <div class="relative">
        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-lg">
          🔒
        </span>
        <input
            id="loginPassword"
          type="password"
          placeholder="Password"
         class="w-full py-3 md:py-4 pl-12 md:pl-14 pr-4 rounded-full outline-none text-base md:text-lg focus:ring-2 focus:ring-[#2F4156]"
          autocomplete="new-password"
        />
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-[#2F4156] text-white py-3 md:py-4 rounded-full font-semibold text-base md:text-lg hover:bg-[#263445] transition active:bg-amber-700 active:scale-95">
      
        Login
      </button>


    </form>
    <a href="forgot-password.html" class="text-blue-500 text-bolder text-xs lg:text-xl p-6 hover:text-blue-900" >Forgot Password ></a>
  </div>
</div>


  </div>
  <script>
  function getParameterByName(name, url) {
    if (!url) url = window.location.href;
    name = name.replace(/[\[\]]/g, '\\$&');
    var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
    var results = regex.exec(url);
    if (!results) return null;
    if (!results[2]) return '';
    return decodeURIComponent(results[2].replace(/\+/g, ' '));
  }

  document.addEventListener("DOMContentLoaded", () => {
    let role = getParameterByName('role');

    // ✅ Fallback if role is missing
    if (!role) {
      role = "Admin"; // default role
    }

    // Update UI
    document.getElementById('welcomeMsg').innerText = "Welcome " + role;

    // Safe image assignment
    const img = document.getElementById('img');
    img.src = "./assets/images/" + role.toLowerCase().replace(/\s+/g, '-') + ".png";

    // Reset form after DOM is ready
    document.getElementById('loginform').reset();

  });
</script>

<script>
  const params = new URLSearchParams(window.location.search);
  
  // Extract the "role" parameter
  const role = params.get("role");
  
</script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
